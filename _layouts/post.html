---
layout: base
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time class="post-date" datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%B %-d, %Y" }}</time>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <footer class="post-nav">
    <a href="{{ '/blog' | relative_url }}">← Back to Blog</a>
  </footer>
</article>
